spring.application.name=fakestore-product-service
spring.datasource.url=jdbc:mysql://mysql-db:3306/fakestore_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
fakestore.api.url=https://fakestoreapi.com/products
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWKS_URL:http://users-service:8080/.well-known/jwks.json}