server {
    listen 80;
    server_name cloudstore-ao.duckdns.org;

    # Skickar vidare all HTTP till HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cloudstore-ao.duckdns.org;

    # Sökvägar till Let's Encrypt-certifikat på EC2-instansen
    ssl_certificate /etc/letsencrypt/live/cloudstore-ao.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloudstore-ao.duckdns.org/privkey.pem;

    # Utökade buffertar för att hantera stora Authorization JWT-tokens
    client_header_buffer_size 8k;
    large_client_header_buffers 4 16k;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/auth/.well-known/ {
        proxy_pass http://ec2-13-51-166-242.eu-north-1.compute.amazonaws.com:8080/.well-known/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/users/ {
        proxy_pass http://ec2-13-51-166-242.eu-north-1.compute.amazonaws.com:8080/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/auth/request-token {
        proxy_pass http://ec2-13-51-166-242.eu-north-1.compute.amazonaws.com:8080/request-token;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/products/ {
        proxy_pass http://ec2-51-21-168-99.eu-north-1.compute.amazonaws.com:8081/products/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/orders/ {
        proxy_pass http://ec2-13-51-166-242.eu-north-1.compute.amazonaws.com:8080/orders/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}