server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Optional: Hantera proxy om du vill undvika CORS-problem i produktion (hjälp från AI)
    # location /api/ {
    #    proxy_pass http://din-ec2-ip:8080/;
    # }
}