services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: fakestore_db
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cloudstore-net

  # Users Service
  users-service:
    build:
      context: ./fakestore-users-service
      dockerfile: Dockerfile
    container_name: users-service
    ports:
      - "8080:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/fakestore_db
      - PRODUCT_SERVICE_URL=http://product-service:8080/products/
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - jwt.issuer=http://localhost:8080
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
    networks:
      - cloudstore-net

      # Product Service
  product-service:
    build:
      context: ./fakestore-product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8081:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/fakestore_db
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWKS_URL=http://users-service:8080/.well-known/jwks.json
    networks:
      - cloudstore-net

  frontend:
    build:
      context: ./fakestore-frontend
      dockerfile: Dockerfile
    container_name: frontend-react
    ports:
      - "80:80"
    depends_on:
      - users-service
      - product-service
    networks:
      - cloudstore-net

networks:
  cloudstore-net:
    driver: bridge