spring.application.name=fakestore-users-service
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fakestore_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8081/products/}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWKS_URL:http://localhost:8080/.well-known/jwks.json}
jwt.issuer=${JWT_ISSUER:http://localhost:8080}
JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}